name: Nightly Builds

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    name: "${{ matrix.compiler }}"
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc/13
            tag: gcc-13
          - compiler: gcc/14
            tag: gcc-14
          - compiler: clang/17
            tag: clang-17
          - compiler: clang/18
            tag: clang-18
          - compiler: clang/19
            tag: clang-19
          - compiler: intel/oneapi
            tag: intel-oneapi
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load python3/3.12.3 opensn/${{ matrix.compiler }}
          mkdir build
          cd build
          cmake \
            -DBLA_VENDOR=OpenBLAS \
            -DBLAS_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DLAPACK_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DOPENSN_WITH_PYTHON_MODULE=ON \
            ..
          make -j
      - name: test
        shell: bash
        run: |
          module load python3/3.12.3 opensn/${{ matrix.compiler }}
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests -d test/python -j 32 -v 1 -w 3 \
            --run-log "$RUNNER_TEMP/logs/nightly_test_${{ matrix.tag }}_log.txt"
      - name: test tutorials
        shell: bash
        run: |
          module load python3/3.12.3 opensn/${{ matrix.compiler }}
          export PYTHONPATH=$PWD/build
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests -d doc/source/tutorials -j 32 -v 1 -w 3 --engine=jupyter \
            --run-log "$RUNNER_TEMP/logs/nightly_tutorials_${{ matrix.tag }}_log.txt"
      - name: test unit
        shell: bash
        run: |
          module load python3/3.12.3 opensn/${{ matrix.compiler }}
          build/test/opensn-unit
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-build-${{ matrix.tag }}
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7

  native:
    name: "${{ matrix.compiler }}"
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc/14
            tag: gcc-14
          - compiler: clang/19
            tag: clang-19
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load python3/3.12.3 opensn/${{ matrix.compiler }}
          mkdir build
          cd build
          cmake \
            -DBLA_VENDOR=OpenBLAS \
            -DBLAS_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DLAPACK_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DCMAKE_BUILD_TYPE=Native \
            -DOPENSN_WITH_PYTHON_MODULE=ON \
            ..
          make -j
      - name: test
        shell: bash
        run: |
          module load python3/3.12.3 opensn/${{ matrix.compiler }}
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests -d test/python -j 32 -v 1 \
            --run-log "$RUNNER_TEMP/logs/nightly_native_${{ matrix.tag }}_log.txt"
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-native-${{ matrix.tag }}
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7

  cuda:
    name: "${{ matrix.compiler }}"
    runs-on: [self-hosted, cuda]
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc/14
            tag: gcc-14
          - compiler: clang/19
            tag: clang-19
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load cuda/13.0 python3/3.12.3 opensn/${{ matrix.compiler }}
          mkdir build
          cd build
          cmake \
            -DBLA_VENDOR=OpenBLAS \
            -DBLAS_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DLAPACK_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DOPENSN_WITH_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES=89 \
            -DOPENSN_WITH_PYTHON_MODULE=ON \
            ..
          make -j
      - name: test
        shell: bash
        run: |
          module load cuda/13.0 python3/3.12.3 opensn/${{ matrix.compiler }}
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests --gpu -d test/python -j 32 -v 1 \
            --run-log "$RUNNER_TEMP/logs/nightly_cuda_${{ matrix.tag }}_log.txt"
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-cuda-${{ matrix.tag }}
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7

  sanitize:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load python3/3.12.3 opensn/clang/17
          cmake \
            -DBLA_VENDOR=OpenBLAS \
            -DBLAS_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DLAPACK_LIBRARIES="/opt/local/OpenBLAS-0.3.31/lib64/libopenblas.a;pthread;m;gfortran" \
            -DOPENSN_WITH_PYTHON_MODULE=ON \
            --preset clang+debug+sanitizer
          cmake --build --preset clang+debug+sanitizer -j64
      - name: test
        shell: bash
        run: |
          module load python3/3.12.3 opensn/clang/17
          export LSAN_OPTIONS=suppressions=$PWD/tools/developer/lsan.supp
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests -d test/python -j 32 -v 1 -w 3 --exe build-debug-sanitizer/python/opensn \
            --run-log "$RUNNER_TEMP/logs/nightly_sanitize_log.txt"
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-sanitize
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7
