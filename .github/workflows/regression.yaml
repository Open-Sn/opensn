name: Regression Tests

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: [self-hosted]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load python3/3.12.3 opensn/gcc/14
          mkdir build && cd build && cmake -DOPENSN_WITH_PYTHON_MODULE=ON .. && make -j && cd ..
      - name: test
        shell: bash
        run: |
          module load python3/3.12.3 opensn/gcc/14
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests -d test/python -j 32 -v 1 -w 3 \
            --run-log "$RUNNER_TEMP/logs/regression_test_log.txt"
      - name: test tutorials
        shell: bash
        run: |
          module load python3/3.12.3 opensn/gcc/14
          export PYTHONPATH=$PWD/build
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests -d doc/source/tutorials -j 32 -v 1 -w 3 --engine=jupyter \
            --run-log "$RUNNER_TEMP/logs/regression_tutorials_log.txt"
      - name: test unit
        shell: bash
        run: |
          module load python3/3.12.3 opensn/gcc/14
          build/test/opensn-unit
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-logs-cpu
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7
  cuda:
    runs-on: [self-hosted, cuda]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load cuda/12.9 python3/3.12.3 opensn/gcc/14
          mkdir build && cd build && cmake -DOPENSN_WITH_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=89 -DOPENSN_WITH_PYTHON_MODULE=ON .. && make -j && cd ..
      - name: test
        shell: bash
        run: |
          module load cuda/12.9 python3/3.12.3 opensn/gcc/14
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests --gpu -d test/python -j 32 -v 1 \
            --run-log "$RUNNER_TEMP/logs/regression_cuda_log.txt"
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-logs-cuda
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7
  hip:
    runs-on: [self-hosted, cuda]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: build
        shell: bash
        run: |
          module load cuda/12.9 python3/3.12.3 rocm/7.1.1 opensn/clang/19
          export HIP_PLATFORM=nvidia
          export HIP_COMPILER=nvcc
          mkdir build && cd build && cmake -DOPENSN_WITH_HIP=ON -DCMAKE_HIP_ARCHITECTURES=89 -DOPENSN_WITH_PYTHON_MODULE=ON .. && make -j && cd ..
      - name: test
        shell: bash
        run: |
          module load cuda/12.9 python3/3.12.3 rocm/7.1.1 opensn/clang/19
          mkdir -p "$RUNNER_TEMP/logs"
          test/run_tests --gpu -d test/python -j 32 -v 1 \
            --run-log "$RUNNER_TEMP/logs/regression_hip_log.txt"
      - name: upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-logs-hip
          path: ${{ runner.temp }}/logs/*_log.txt
          if-no-files-found: ignore
          retention-days: 7
